name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-quartz:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Clone Quartz
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git _quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: _quartz

      - name: Copy config
        run: cp .quartz-config/quartz.config.yaml _quartz/quartz.config.yaml

      - name: Copy favicon
        run: curl -L -o _quartz/quartz/static/icon.png https://willkelly.dev/assets/favicon.png

      - name: Copy content
        run: |
          rm -rf _quartz/content
          rsync -av --exclude='.git' --exclude='.github' --exclude='.quartz-config' --exclude='_quartz' ./ _quartz/content/

      - name: Install Quartz plugins
        run: npx quartz plugin install
        working-directory: _quartz

      - name: Build Quartz
        run: npx quartz build
        working-directory: _quartz

      - name: Upload Quartz output
        uses: actions/upload-artifact@v4
        with:
          name: quartz-output
          path: _quartz/public/

  deploy:
    needs: build-quartz
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Quartz output
        if: needs.build-quartz.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: quartz-output
          path: _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4