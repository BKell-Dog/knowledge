configuration:
  pageTitle: "Knowledge Base"
  pageTitleSuffix: ""
  enableSPA: false
  enablePopovers: true
  locale: "en-US"
  baseUrl: "willkelly.dev/knowledge"
  ignorePatterns:
    - private
    - templates
    - .obsidian
  defaultDateType: created
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: "Schibsted Grotesk"
      body: "Source Sans Pro"
      code: "IBM Plex Mono"
    colors:
      lightMode:
        light: "#faf8f8"
        lightgray: "#e5e5e5"
        gray: "#b8b8b8"
        darkgray: "#4e4e4e"
        dark: "#2b2b2b"
        secondary: "#284b63"
        tertiary: "#84a59d"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#fff23688"
      darkMode:
        light: "#161618"
        lightgray: "#393639"
        gray: "#646464"
        darkgray: "#d4d4d4"
        dark: "#ebebec"
        secondary: "#7b97aa"
        tertiary: "#84a59d"
        highlight: "rgba(143, 159, 169, 0.15)"
        textHighlight: "#b3aa0288"

plugins:
  # Transformers
  - source: github:quartz-community/note-properties
    enabled: true
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      priority: [frontmatter, filesystem]
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
  - source: github:quartz-community/description
    enabled: true
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex

  # Filters
  - source: github:quartz-community/remove-drafts
    enabled: true

  # Page types / emitters
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10

  # Layout — left sidebar
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
  - source: github:quartz-community/spacer
    enabled: true
    layout:
      position: left
      priority: 30
      display: mobile-only
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
      display: desktop-only
    options:
      folderClickBehavior: collapse

  # Layout — right sidebar
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 20
  - source: github:quartz-community/table-of-contents
    enabled: true
    layout:
      position: right
      priority: 30
      display: desktop-only